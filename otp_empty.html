<!DOCTYPE html>
<html class="light" dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MazadPay - OTP Verification</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38A9FF",
                        "background-light": "#FFFFFF",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        display: ["Tajawal", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .otp-input:focus {
            border-color: #38A9FF;
            box-shadow: 0 0 0 2px rgba(56, 169, 255, 0.2);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
    <div
        class="fixed top-0 w-full h-11 px-6 flex justify-between items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
        <span class="text-sm font-semibold">9:41</span>
        <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-[18px]">signal_cellular_alt</span>
            <span class="material-symbols-outlined text-[18px]">wifi</span>
            <span class="material-symbols-outlined text-[18px] rotate-90">battery_full</span>
        </div>
    </div>
    <main class="pt-16 pb-8 px-6 max-w-md mx-auto flex flex-col min-h-screen">
        <div class="flex justify-between items-center mb-10">
            <button class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"
                onclick="toggleDarkMode()">
                <span class="material-symbols-outlined dark:hidden">dark_mode</span>
                <span class="material-symbols-outlined hidden dark:block">light_mode</span>
            </button>
            <button class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
                <span class="material-symbols-outlined">arrow_forward_ios</span>
            </button>
        </div>
        <div class="flex-grow">
            <h1 class="text-2xl font-bold mb-3 text-right">أدخل رمز التحقق</h1>
            <p class="text-slate-500 dark:text-slate-400 text-right leading-relaxed mb-10">
                ادخل الرمز المكون من 6 أرقام المرسل عبر الواتساب إلى
                <span class="font-bold text-slate-800 dark:text-slate-200" dir="ltr">36601175</span>
            </p>
            <div class="flex justify-between gap-2 mb-10" dir="ltr">
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
                <input
                    class="otp-input w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold border-2 border-slate-200 dark:border-slate-700 rounded-2xl bg-transparent focus:ring-primary focus:border-primary outline-none transition-all dark:text-white"
                    maxlength="1" type="number" />
            </div>
            <div class="text-center mb-10">
                <p class="text-slate-400 dark:text-slate-500">
                    إعادة إرسال الرمز خلال <span class="font-medium text-slate-600 dark:text-slate-300">4:24</span>
                </p>
            </div>
            <button
                class="w-full bg-primary hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-500/30 active:scale-[0.98]">
                تحقق
            </button>
        </div>
        <div class="mt-auto pt-6 text-center">
            <button class="text-slate-500 dark:text-slate-400 font-medium hover:text-primary transition-colors">
                تغيير طريقة التحقق
            </button>
        </div>
        <div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 mx-auto mt-8 rounded-full"></div>
    </main>
    <script>
        // Simple auto-focus logic for OTP inputs
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>

</body>

</html>
