<!DOCTYPE html>
<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MazadPay - OTP Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#38b6ff", // The blue from the screenshot
                        "background-light": "#ffffff",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        display: ["Tajawal", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .otp-input {
            width: 48px;
            height: 54px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }
        @media (max-width: 380px) {
            .otp-input {
                width: 42px;
                height: 48px;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-start p-6">
<div class="w-full h-12 flex justify-between items-center px-4 mb-8">
<span class="text-sm font-semibold">9:41</span>
<div class="flex items-center gap-1">
<span class="material-icons text-xs">signal_cellular_alt</span>
<span class="material-icons text-xs">wifi</span>
<span class="material-icons text-xs">battery_full</span>
</div>
</div>
<div class="w-full max-w-md flex flex-col items-center">
<div class="w-full mb-10 text-right pr-2">
<h1 class="text-xl font-bold mb-2">أدخل رمز التحقق</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                ادخل الرمز المكون من 6 أرقام المرسل عبر الواتساب إلى 
                <span class="font-bold text-slate-800 dark:text-slate-200" dir="ltr">36601175</span>
</p>
</div>
<div class="flex flex-row-reverse justify-between w-full mb-10 gap-2 px-1">
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="4"/>
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="6"/>
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="0"/>
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="7"/>
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="2"/>
<input class="otp-input border-2 border-slate-300 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800 focus:border-primary focus:ring-0 outline-none transition-colors" maxlength="1" type="text" value="4"/>
</div>
<div class="mb-12">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">
                إعادة إرسال الرمز خلال <span class="text-slate-700 dark:text-slate-300">4:24</span>
</p>
</div>
<button class="w-full bg-primary/60 dark:bg-primary/50 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all mb-8">
            تحقق
        </button>
<button class="text-slate-500 dark:text-slate-400 text-sm hover:underline">
            تغيير طريقة التحقق
        </button>
</div>
<div class="fixed bottom-2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full left-1/2 -translate-x-1/2"></div>

</body></html>
